services:
  nginx:
    image: nginx:alpine
    container_name: nginx-hub-totalrenting
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    environment:
      - HUB_PORT=${PORT:-3002}
    depends_on:
      hub-1:
        condition: service_healthy
      hub-2:
        condition: service_healthy
      hub-3:
        condition: service_healthy
    restart: always
    command: /bin/sh -c "envsubst '$$HUB_PORT' < /etc/nginx/templates/default.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - hub-network

  hub-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-hub-totalrenting-1
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - INSTANCE_ID=1
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:${PORT:-3002}/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - hub-network
      - api-network

  hub-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-hub-totalrenting-2
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - INSTANCE_ID=2
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:${PORT:-3002}/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - hub-network
      - api-network

  hub-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-hub-totalrenting-3
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - INSTANCE_ID=3
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:${PORT:-3002}/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - hub-network
      - api-network

networks:
  hub-network:
    driver: bridge
  api-network:
    external: true
    name: api-totalrenting-network
